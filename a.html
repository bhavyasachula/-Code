<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Antigravity WebGL Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        img{
            animation: rotate 4s linear infinite ;    
        }
        
        @keyframes rotate{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
 
        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            position: relative;
            z-index: 2;
            padding: 10% 0 0 10%;
            max-width: 800px;
        }
        
        h1 {
            font-size: 4rem;
            color: #1f1f1f;
            font-weight: 500;
            letter-spacing: -2px;
            line-height: 1.1;
            user-select: none;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="content">
        <h1>SORCERER SUPEREME<br>BHAVYA</h1>
        <img src="Sorcerer_Supereme.png"  alt="polo" height="200px" width="200px">
    </div>
    
    <script>
     const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        
        const camera = new THREE.OrthographicCamera(-width/2, width/2, height/2, -height/2, 0.1, 1000);
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const uniforms = {
            u_mouse: { value: new THREE.Vector2(-1000, -1000) },
            u_mouseVel: { value: 0.0 },
            u_time: { value: 1.0 },
            u_radius: { value: 400.0 },
            u_color: { value: new THREE.Color('#f22998') }
        };

        // FIXED VERTEX SHADER SCRIPT (Syntax errors removed)
       const vertexShader = `
            uniform vec2 u_mouse;
            uniform float u_mouseVel;
            uniform float u_radius;
            uniform float u_time;
            
            attribute vec3 a_basePos;
            varying float vAlpha;

            void main() {
                vec3 pos = a_basePos;
                float dist = distance(u_mouse, pos.xy);
                vAlpha = 0.0;

                if (dist < u_radius) {
                    // Smoothstep curve for soft force distribution
                    float pct = (u_radius - dist) / u_radius;
                    float smoothFactor = (1.0 - cos(pct * 3.14159265)) / 2.0;
                    
                    // Ultra-smooth alpha curve so edges are completely invisible
                    vAlpha = pow(smoothFactor, 1.5) * 0.85;

                    // 1. LIQUID DEFORMATION FORCE FIELDS
                    // Blending a dynamic sine wave onto the angle computation creates an elastic ripple effect
                    vec2 dir = pos.xy - u_mouse;
                    float baseAngle = atan(dir.y, dir.x);
                    
                    // Wave frequency modulations creating mini fluid-eddies on movement
                    float rippleWave = sin(dist * 0.04 - u_time * 4.0) * 0.25;
                    float fluidAngle = baseAngle + (3.14159265 / 1.35) + (rippleWave * u_mouseVel);
                    
                    // 2. VISCOUS PUSH FORCES
                    // Combined rotational velocity field and soft expansion vectors
                    float pushIntensity = 1.0 + (u_mouseVel * 16.0);
                    pos.x += cos(fluidAngle) * smoothFactor * pushIntensity;
                    pos.y += sin(fluidAngle) * smoothFactor * pushIntensity;
                    
                }

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                // Slightly larger sizing blends better across fluid curves
                gl_PointSize = 5.0; 
            }
        `;

        const fragmentShader = `
            uniform vec3 u_color;
            varying float vAlpha;

            void main() {
                vec2 circCoord = gl_PointCoord - vec2(0.5);
                if (dot(circCoord, circCoord) > 0.25) {
                    discard;
                }
                gl_FragColor = vec4(u_color, vAlpha);
            }
        `;

        let geometry, material, points;
        const spacing = 36; 

        function initGrid() {
            if (points) {
                scene.remove(points);
                geometry.dispose();
            }

            geometry = new THREE.BufferGeometry();
            const positions = [];
            const basePositions = [];

            for (let x = -width/2 - spacing; x < width/2 + spacing; x += spacing) {
                for (let y = -height/2 - spacing; y < height/2 + spacing; y += spacing) {
                    positions.push(x, y, 0);
                    basePositions.push(x, y, 0);
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('a_basePos', new THREE.Float32BufferAttribute(basePositions, 3));

            material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms,
                transparent: true,
                depthWrite: false,
                blending: THREE.NormalBlending
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        let lastMouseX = 0, lastMouseY = 0;
        let targetVelocity = 0;
        const clock = new THREE.Clock();

        window.addEventListener('mousemove', (e) => {
            const canvasMouseX = e.clientX - width / 2;
            const canvasMouseY = -(e.clientY - height / 2);

            uniforms.u_mouse.value.set(canvasMouseX, canvasMouseY);

            let dx = e.clientX - lastMouseX;
            let dy = e.clientY - lastMouseY;
            let speed = Math.sqrt(dx * dx + dy * dy);
            
            // Scaled capture speed for a weightier liquid feel
            targetVelocity = Math.min(speed / 5, 1.0);

            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            uniforms.u_mouse.value.set(-10000, -10000);
            targetVelocity = 0.0;
        });

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;

            camera.left = -width / 2;
            camera.right = width / 2;
            camera.top = height / 2;
            camera.bottom = -height / 2;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            initGrid();
        });

        function animate() {
            requestAnimationFrame(animate);

            // Real-time time track update injected straight into GLSL math variables
            uniforms.u_time.value = clock.getElapsedTime();

            // Highly viscous dampening speed (0.12 creates a thick water resistance glide)
            uniforms.u_mouseVel.value += (targetVelocity - uniforms.u_mouseVel.value) * 0.12;
            targetVelocity *= 0.85; 

            renderer.render(scene, camera);
        }

        initGrid();
        animate();
    </script>
</body>
</html>
